<!doctype html>
<html>
  <body style="font-family: Arial, sans-serif; background: #0f1015; color: #e5e7eb; padding: 24px;">
    <div style="max-width: 560px; margin: 0 auto; background: #171923; border-radius: 16px; padding: 24px; border: 1px solid #2d3446;">
      <h2 style="margin-top: 0; color: #9fcb5c;">{{ brand_name }} Password Reset</h2>
      <p>Your one-time password is:</p>
      <p style="font-size: 32px; letter-spacing: 6px; font-weight: 700; color: #ffffff; margin: 12px 0 24px;">{{ otp }}</p>
      <p>This OTP expires in <strong>10 minutes</strong>.</p>
      <p>If you did not request this, contact {{ support_email }} immediately.</p>
    </div>
  </body>
</html>
